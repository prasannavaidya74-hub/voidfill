{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 mt-5">
        <div class="card shadow-lg border-0 overflow-hidden animate-fade-in">
            <div class="card-header bg-primary text-white text-center py-4">
                <i class="bi bi-shield-lock fs-1 mb-2"></i>
                <h4 class="mb-0 fw-bold">Email Verification</h4>
                <p class="text-dim small mb-0 mt-2">Enter the 6-digit OTP sent to {{ email }}</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="POST" action="{{ url_for('verify_otp') }}">
                    <div class="mb-4">
                        <label for="otp" class="form-label fw-bold">Activation Code</label>
                        <div class="input-group">
                            <span class="input-group-text bg-glass-dark border-0"><i
                                    class="bi bi-key-fill text-primary"></i></span>
                            <input type="text" class="form-control form-control-lg bg-glass-dark border-0 text-white"
                                id="otp" name="otp" required pattern="\d{6}" maxlength="6" placeholder="123456"
                                autofocus style="letter-spacing: 5px; font-weight: 800;">
                        </div>
                        <div id="otpHelp" class="form-text text-muted mt-2">
                            Verification code is valid for 5 minutes.
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold">
                            <i class="bi bi-check2-circle me-2"></i> Verify & Activate Account
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-transparent border-0 text-center pb-4">
                <p class="small text-dim mb-0">
                    Didn't receive the email? <br>
                    <a href="{{ url_for('student_register') }}" class="text-primary text-decoration-none fw-bold">
                        <i class="bi bi-arrow-repeat"></i> Resend Code
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    .input-group-text {
        border-radius: 14px 0 0 14px !important;
    }

    .form-control {
        border-radius: 0 14px 14px 0 !important;
    }
</style>
{% endblock %}
