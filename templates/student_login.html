{% extends 'layout.html' %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 animate-fade-in">
            <div class="card-header text-center py-4">
                <h4 class="mb-0 fw-bold"><i class="bi bi-person-circle me-2"></i> Student Login</h4>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg"
                            placeholder="name@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                            placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 rounded-pill fw-bold">
                        Login To Portal <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                    <div class="mt-4 text-center">
                        <p class="text-muted small">Don't have an account? <a href="{{ url_for('student_register') }}"
                                class="text-primary fw-bold">Register Now</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
